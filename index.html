<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Lista ceremonial de invitados</title>
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #fdfcf7; text-align: center; }
    h2 { color: #d4af37; }
    table { border-collapse: collapse; margin: 20px auto; width: 80%; }
    th, td { border: 1px solid #d4af37; padding: 8px; text-align: center; }
    th { background-color: #f9f2d9; font-weight: bold; }
    tr:nth-child(even) { background-color: #fff8e1; }
  </style>
</head>
<body>
  <h2>Lista completa de invitados</h2>
  <table id="invitados"></table>

  <script>
const url = "https://cors-anywhere.herokuapp.com/https://docs.google.com/spreadsheets/d/e/2PACX-1vTrbV0NfuoB99HAj3Ffcr_xbB2fXWbE9VS4g2Ffcj37an_ExLwoPKr9GRFWTT4am96FaeMY7tGXhdbV/pub?gid=596167547&single=true&output=csv";

fetch(url)
  .then(res => res.text())
  .then(data => {
    const rows = data.split("\n").map(r => r.split(","));
    let html = "<tr><th>" + rows[0].join("</th><th>") + "</th></tr>";
    for (let i = 1; i < rows.length; i++) {
      if (rows[i].length > 1) {
        html += "<tr><td>" + rows[i].join("</td><td>") + "</td></tr>";
      }
    }
    document.getElementById("invitados").innerHTML = html;
  })
  .catch(err => {
    document.getElementById("invitados").innerHTML = "<tr><td>Error al cargar datos</td></tr>";
    console.error(err);
  });
</script>
</body>
</html>
